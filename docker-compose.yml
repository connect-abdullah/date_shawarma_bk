services:
  # PostgreSQL Database (optional - you can use Supabase instead)
  postgres:
    image: postgres:15-alpine
    container_name: date-shawarma-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: date_shawarma
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - date-shawarma-network

  # Application Service
  # Run migrations: docker compose run --rm app alembic upgrade head
  # Create migration: docker compose run --rm app alembic revision --autogenerate -m "description"
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: date-shawarma-app
    env_file:
      - .env
    environment:
      RELOAD: "1"
      DATABASE_URL: ${DATABASE_URL}
      GOOGLE_SMTP: ${GOOGLE_SMTP:-smtp.gmail.com}
      GOOGLE_PORT: ${GOOGLE_PORT:-587}
      GOOGLE_EMAIL: ${GOOGLE_EMAIL}
      GOOGLE_PASSWORD: ${GOOGLE_PASSWORD}
      # To use local PostgreSQL instead, set in .env:
      # DATABASE_URL=postgresql://postgres:postgres@postgres:5432/date_shawarma
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      # ./images on host is available as /app/images for menu import script
    networks:
      - date-shawarma-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  date-shawarma-network:
    driver: bridge
